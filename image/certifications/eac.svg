<?xml version="1.0" encoding="UTF-8"?>
<!-- EAC — Eurasian Conformity mark (Единый знак обращения продукции на рынке ЕАЭС).
     Geometry per Решение КТС № 711 от 15.07.2011: block letters on a square grid,
     stroke = 1/5 letter height, monochrome. -->
<svg width="280px" height="200px" viewBox="0 0 280 200" version="1.1" xmlns="http://www.w3.org/2000/svg">
 <g fill="black">
  <!-- Е -->
  <rect x="0" y="50" width="20" height="100"/>
  <rect x="0" y="50" width="80" height="20"/>
  <rect x="0" y="90" width="80" height="20"/>
  <rect x="0" y="130" width="80" height="20"/>
  <!-- А -->
  <rect x="100" y="50" width="20" height="100"/>
  <rect x="160" y="50" width="20" height="100"/>
  <rect x="100" y="50" width="80" height="20"/>
  <rect x="120" y="90" width="40" height="20"/>
  <!-- С -->
  <rect x="200" y="50" width="20" height="100"/>
  <rect x="200" y="50" width="80" height="20"/>
  <rect x="200" y="130" width="80" height="20"/>
 </g>
</svg>
